id: "@treeseed/ui"
name: TreeSeed UI
kind: node-typescript
type: ui-library
repository: treeseed-ai/ui
publishTarget: npm
workflowTemplateVersion: "1"
githubEnvironments:
  - production
requiredSecrets:
  - NPM_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:direct
  release: npm run release:verify
artifacts:
  - provider: npm
    name: "@treeseed/ui"
releaseGate:
  workflow: deploy.yml
