id: "@treeseed/ui"
name: TreeSeed UI
kind: node-typescript
type: ui-library
repository: treeseed-ai/ui
publishTarget: npm
workflowTemplateVersion: "1"
githubEnvironments:
  - production
requiredSecrets:
  - NPM_TOKEN
verify:
  fast: npm run verify
  local: npm run verify:direct
  release: npm run release:verify
artifacts:
  - provider: npm
    name: "@treeseed/ui"
releaseGate:
  workflow: deploy.yml
projectArchitecture:
  topology: single_repository_site
  rootPath: .
  sitePath: docs
  contentPath: docs
  contentRuntimeSource: r2_published_manifest
  localContentMaterialization: none
  contentPublishTarget:
    kind: cloudflare_r2
    prefix: packages/ui
