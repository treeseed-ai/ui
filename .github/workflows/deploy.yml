name: Verify TreeSeed UI

on:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm run release:setup
      - run: bash -lc 'npm run verify:direct'
