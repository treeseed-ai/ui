name: Verify TreeSeed UI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci || (echo "dependency install failed; retrying" && npm ci)
      - run: bash -lc npm run verify:direct
